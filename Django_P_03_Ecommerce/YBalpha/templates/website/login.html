{% include 'website/navbar.html' %}

{% block content %}

<div class="container d-flex justify-content-center align-items-center"
     style="min-height:70vh;">

    <div class="card shadow p-4 text-center" style="max-width:420px; width:100%;">

        <h3 class="mb-3">Sign in with Google</h3>

        <p class="text-muted">
            You are about to sign in using your Google account.
        </p>

        <form method="post">
            {% csrf_token %}
            <button class="btn btn-primary w-100">
                Continue
            </button>
        </form>

    </div>

</div>

{% endblock %}
